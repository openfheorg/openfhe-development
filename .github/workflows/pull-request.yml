name: Pull-Request

on:
  pull_request:
    branches:
      - main

env:
  CMAKE_ARGS: "-DCMAKE_CXX_COMPILER=/usr/bin/g++-11 -DCMAKE_C_COMPILER=/usr/bin/gcc-11"

jobs:

  call:
    uses: openfheorg/openfhe-development/.github/workflows/reuseable_workflow.yml@718-modify-workflows-github-ci
    with:
      runner_tag: ${{ vars.RUNNER }}
      mb2_debug: true
      mb2_tcm: true
      mb4_noflag: true
      mb4_debug: true
      mb4_tcm: true
      mb6_ntl_noflag: true
      mb6_ntl_debug_tcm: true
      mb6_ntl_tcm: true
