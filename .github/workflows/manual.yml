name: Manual

on:
  workflow_dispatch:
    inputs:
      # Selelects the compiler to use, this will be used in the COMPILERS_MAP as the key to
      # retrieve the corresponding cmake compiler options to pass to the action
      compiler:
        description: 'Compiler Type [GCC|CLANG]'
        type: choice
        options:
        - 'GCC-9'
        - 'GCC-10'
        - 'GCC-11'
        - 'GCC-12'
        - 'CLANG-12'
        - 'CLANG-13'
        - 'CLANG-14'
        - 'CLANG-15'
        required: true
        default: 'GCC-11'
      native_backend:
        description: 'Size of NativeInteger [32|64|128]'
        type: choice
        options:
        - '32'
        - '64'
        - '128'
        - 'all'
        required: true
        default: '64'
      mb2_jobs:
        description: 'mb2 jobs to run'
        type: choice
        options:
        - 'mb2_default'
        - 'mb2_debug'
        - 'mb2_tcm'
        - 'all'
        required: true
        default: 'mb2_default'
      mb4_jobs:
        description: 'mb4 jobs to run'
        type: choice
        options:
        - 'mb4_noflag'
        - 'mb4_debug'
        - 'mb4_tcm'
        - 'all'
        required: true
        default: 'all'
      mb6_jobs:
        description: 'mb6 jobs to run'
        type: choice
        options:
        - 'mb6_ntl_noflag'
        - 'mb6_ntl_debug_tcm'
        - 'mb6_ntl_tcm'
        - 'all'
        required: true
        default: 'all'

env:
  # JSON map to convert input Compiler Type to correct cmake args, key is the input.compiler and the value is the cmake string to set the compiler for C and C++
  COMPILERS_MAP: >-
    {
      "GCC-9"     : "-DCMAKE_CXX_COMPILER=/usr/bin/g++-9 -DCMAKE_C_COMPILER=/usr/bin/gcc-9",
      "GCC-10"    : "-DCMAKE_CXX_COMPILER=/usr/bin/g++-10 -DCMAKE_C_COMPILER=/usr/bin/gcc-10",
      "GCC-11"    : "-DCMAKE_CXX_COMPILER=/usr/bin/g++-11 -DCMAKE_C_COMPILER=/usr/bin/gcc-11",
      "GCC-12"    : "-DCMAKE_CXX_COMPILER=/usr/bin/g++-12 -DCMAKE_C_COMPILER=/usr/bin/gcc-12",
      "CLANG-12"  : "-DCMAKE_CXX_COMPILER=/usr/bin/clang++-12 -DCMAKE_C_COMPILER=/usr/bin/clang-12",
      "CLANG-13"  : "-DCMAKE_CXX_COMPILER=/usr/bin/clang++-13 -DCMAKE_C_COMPILER=/usr/bin/clang-13",
      "CLANG-14"  : "-DCMAKE_CXX_COMPILER=/usr/bin/clang++-14 -DCMAKE_C_COMPILER=/usr/bin/clang-14",
      "CLANG-15"  : "-DCMAKE_CXX_COMPILER=/usr/bin/clang++-15 -DCMAKE_C_COMPILER=/usr/bin/clang-15",
    }
  INTEGER_SIZE_MAP: >-
    {
      "32"  : [32],
      "64"  : [64],
      "128" : [128],
      "all" : [32, 64, 128],
    }

jobs:

  ###############################################
  #
  #    default jobs starts here
  #
  ###############################################
  default:
    strategy:
      matrix:
        integer_size: ${{ fromJson(env.INTEGER_SIZE_MAP)[github.event.inputs.native_backend] }}

    runs-on: ${{ vars.RUNNER }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: default ${{ matrix.integer_size }}
      uses: openfheorg/openfhe-development/.github/actions/default_builder@718-modify-workflows-github-ci
      with:
        module_name: default
        cmake_args: ${{ fromJson(env.COMPILERS_MAP)[github.event.inputs.compiler] }}
        native_backend: ${{ matrix.integer_size }}


  ###############################################
  #
  #    mb2_default jobs starts here
  #
  ###############################################
  mb2_default:
    if: ${{ (github.event.inputs.mb2_jobs == 'mb2_default') || (github.event.inputs.mb2_jobs == 'all') }}
    strategy:
      matrix:
        integer_size: ${{ fromJson(env.INTEGER_SIZE_MAP)[github.event.inputs.native_backend] }}

    needs: default ${{ matrix.integer_size }}
    runs-on: ${{ vars.RUNNER }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: mb2_default ${{ matrix.integer_size }}
      uses: openfheorg/openfhe-development/.github/actions/default_builder@718-modify-workflows-github-ci
      with:
        module_name: mb2_default
        cmake_args: ${{ fromJson(env.COMPILERS_MAP)[github.event.inputs.compiler] }}
        native_backend: ${{ matrix.integer_size }}
        mathbackend: 2
        run_extras: true


  ###############################################
  #
  #    mb2_debug jobs starts here
  #
  ###############################################
  mb2_debug:
    if: ${{ (github.event.inputs.mb2_jobs == 'mb2_debug') || (github.event.inputs.mb2_jobs == 'all') }}
    strategy:
      matrix:
        integer_size: ${{ fromJson(env.INTEGER_SIZE_MAP)[github.event.inputs.native_backend] }}

    needs: default ${{ matrix.integer_size }}
    runs-on: ${{ vars.RUNNER }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: mb2_debug ${{ matrix.integer_size }}
      uses: openfheorg/openfhe-development/.github/actions/default_builder@718-modify-workflows-github-ci
      with:
        module_name: mb2_debug
        cmake_args: ${{ fromJson(env.COMPILERS_MAP)[github.event.inputs.compiler] }}
        native_backend: ${{ matrix.integer_size }}
        mathbackend: 2
        with_debug: true
        run_extras: true


  ###############################################
  #
  #    mb2_tcm jobs starts here
  #
  ###############################################
  mb2_tcm:
    if: ${{ (github.event.inputs.mb2_jobs == 'mb2_tcm') || (github.event.inputs.mb2_jobs == 'all') }}
    strategy:
      matrix:
        integer_size: ${{ fromJson(env.INTEGER_SIZE_MAP)[github.event.inputs.native_backend] }}

    needs: default ${{ matrix.integer_size }}
    runs-on: ${{ vars.RUNNER }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: mb2_tcm ${{ matrix.integer_size }}
      uses: openfheorg/openfhe-development/.github/actions/default_builder@718-modify-workflows-github-ci
      with:
        module_name: mb2_tcm
        cmake_args: ${{ fromJson(env.COMPILERS_MAP)[github.event.inputs.compiler] }}
        native_backend: ${{ matrix.integer_size }}
        mathbackend: 2
        with_tcm: true
        run_extras: true


