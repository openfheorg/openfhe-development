name: Manual with reuseable

on:
  workflow_call:
    inputs:
      compiler:
        description: 'Compiler type'
        type: string
        required: true
        default: 'GCC-11'

  workflow_dispatch:
    inputs:
      # # Selects the compiler to use, this choice will be used in the COMPILERS_MAP as the key to
      # # retrieve the corresponding cmake compiler options to pass to the action
      compiler:
        description: 'Compiler type'
        type: choice
        options:
        - 'GCC-9'
        - 'GCC-10'
        - 'GCC-11'
        - 'GCC-12'
        - 'CLANG-12'
        - 'CLANG-13'
        - 'CLANG-14'
        - 'CLANG-15'
        required: true
        default: 'GCC-11'
  
